  .btns { display: flex; gap: 8px; flex-wrap: wrap; }
  button {

  button.active { background: var(--accent); color: #081120; border-color: transparent; font-weight: 700; }
  .section { margin: 28px 0 10px; }
  .section h2 { margin-bottom: 8px; text-transform: capitalize; }
  .section-meta { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
  .cards { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .card { background: rgba(18, 26, 43, 0.88); border: 1px solid var(--border); border-radius: 18px; padding: 18px; }
  .headline { font-size: 20px; line-height: 1.3; margin-bottom: 12px; }
  .summary { line-height: 1.5; }
  .why { color: var(--muted); margin-top: 12px; line-height: 1.5; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .chip { font-size: 12px; color: var(--muted); background: var(--chip); border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; }
  .links { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .links a { color: var(--accent); text-decoration: none; word-break: break-word; }
  .links a:hover { text-decoration: underline; }
  details { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  summary { cursor: pointer; color: var(--muted); }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
  pre {
    white-space: pre-wrap; word-break: break-word; background: #0c1425;
    border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #c7d4ee;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
  @media (max-width: 640px) { .wrap { padding: 14px; } .grid { grid-template-columns: 1fr; } }
</style>

  <div class="wrap">

      <h1>Jesse Daily Brief</h1>
      <p id="intro"></p>
      <p class="sub" id="meta"></p>

        <div class="stat"><div class="label">Profile</div><div class="value" id="profileName" style="font-size:18px;"></div></div>
      </div>

      <div class="toolbar">

        <div class="btns">

      <details>

      </details>
    </div>
  </div>

const sectionsContainer = document.getElementById('sections');
const searchInput = document.getElementById('search');
const filterButtons = [...document.querySelectorAll('button[data-filter]')];
let activeFilter = 'all';

document.getElementById('intro').textContent = data.intro || 'No intro available.';
document.getElementById('meta').textContent =
  `Generated: ${data.generated_at || 'n/a'} · Window: ${data.window?.start || 'n/a'} → ${data.window?.end || 'n/a'}`;
document.getElementById('candidateArticles').textContent = data.counts?.candidate_articles ?? '—';
document.getElementById('candidateClusters').textContent = data.counts?.candidate_clusters ?? '—';
document.getElementById('finalItems').textContent = data.counts?.final_items ?? '—';
document.getElementById('profileName').textContent = data.profile?.profile_name || '—';
document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);

function makeChip(text) {
  const span = document.createElement('span');
  span.className = 'chip';
  span.textContent = text;
  return span;
}

function itemText(item) {
  return [
    item.headline,
    item.summary,
    item.why_it_matters,
    ...(item.primary_entities || []),
    ...(item.story_tags || [])
  ].join(' ').toLowerCase();
}

function render() {
  const q = searchInput.value.trim().toLowerCase();
  sectionsContainer.innerHTML = '';

  (data.sections || []).forEach(section => {
    if (activeFilter !== 'all' && section.name !== activeFilter) return;

    const filteredItems = (section.items || []).filter(item => {
      if (!q) return true;
      return itemText(item).includes(q);
    });

    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'section';

    const title = document.createElement('h2');
    title.textContent = section.name.replaceAll('_', ' ');
    sectionDiv.appendChild(title);

    const meta = document.createElement('div');
    meta.className = 'section-meta';
    meta.textContent = `${filteredItems.length} shown`;
    sectionDiv.appendChild(meta);

    if (!filteredItems.length) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = 'No items.';
      sectionDiv.appendChild(empty);
      sectionsContainer.appendChild(sectionDiv);
      return;
    }

    const cards = document.createElement('div');
    cards.className = 'cards';

    filteredItems.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';

      const headline = document.createElement('div');
      headline.className = 'headline';
      headline.textContent = item.headline || 'Untitled';
      card.appendChild(headline);

      const summary = document.createElement('div');
      summary.className = 'summary';
      summary.textContent = item.summary || '';
      card.appendChild(summary);

      const why = document.createElement('div');
      why.className = 'why';
      why.textContent = item.why_it_matters || '';
      card.appendChild(why);

      const chips = document.createElement('div');
      chips.className = 'chips';
      chips.appendChild(makeChip(`confidence: ${item.confidence || 'n/a'}`));
      chips.appendChild(makeChip(`sources: ${item.source_count ?? 'n/a'}`));
      chips.appendChild(makeChip(`quality: ${item.cluster_quality || 'n/a'}`));
      if ((item.publisher_domains || []).length) {
        chips.appendChild(makeChip(item.publisher_domains.join(', ')));
      }
      (item.primary_entities || []).slice(0,3).forEach(e => chips.appendChild(makeChip(`entity: ${e}`)));
      (item.story_tags || []).slice(0,3).forEach(t => chips.appendChild(makeChip(`tag: ${t}`)));
      card.appendChild(chips);

      const links = document.createElement('div');
      links.className = 'links';
      (item.source_links || []).forEach((url, idx) => {
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        try {
          const host = new URL(url).hostname.replace(/^www\./,'');
          a.textContent = `Open source ${idx + 1} · ${host}`;
        } catch {
          a.textContent = `Open source ${idx + 1}`;
        }
        links.appendChild(a);
      });
      card.appendChild(links);

      const details = document.createElement('details');
      const summaryEl = document.createElement('summary');
      summaryEl.textContent = 'Technical details';
      details.appendChild(summaryEl);

      const detailBody = document.createElement('pre');
      detailBody.textContent = JSON.stringify({
        supporting_article_ids: item.supporting_article_ids || [],
        publisher_domains: item.publisher_domains || [],
        primary_entities: item.primary_entities || [],
        story_tags: item.story_tags || []
      }, null, 2);
      details.appendChild(detailBody);

      card.appendChild(details);
      cards.appendChild(card);
    });

    sectionDiv.appendChild(cards);
    sectionsContainer.appendChild(sectionDiv);
  });
}

searchInput.addEventListener('input', render);
filterButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    filterButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

render();
</script>
